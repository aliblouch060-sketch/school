services:
  - type: web
    name: school-management-system
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: school-management-db
          property: connectionString
      - key: PGSSL
        value: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: school-management-db
    plan: free
    databaseName: school_management
    user: school_admin